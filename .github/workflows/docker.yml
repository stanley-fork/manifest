name: Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version override (e.g. 5.38.1). Leave blank to use the current version from packages/manifest/package.json."
        required: false
        type: string
  pull_request:
    branches: [main]
    paths:
      - "docker/Dockerfile"
      - ".dockerignore"
      - "docker/docker-compose.yml"
      - "docker/.env.example"
      - "docker/install.sh"
      - "packages/backend/**"
      - "packages/frontend/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"

permissions:
  contents: read

jobs:
  validate:
    name: Build (validate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Build & Publish
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Using version from workflow input: $VERSION"
          else
            VERSION=$(jq -r .version packages/manifest/package.json)
            echo "Using version from packages/manifest/package.json: $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: manifestdotbuild/manifest
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
            type=sha

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - uses: sigstore/cosign-installer@v3

      - name: Sign published image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          for tag in ${TAGS}; do
            cosign sign --yes "${tag}@${DIGEST}"
          done
